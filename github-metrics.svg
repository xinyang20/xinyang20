<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Metrics Placeholder</title>
  <desc id="desc">Placeholder card until the metrics workflow generates a fresh SVG.</desc>
  <rect width="900" height="320" rx="20" fill="#f6f8fa"/>
  <rect x="24" y="24" width="852" height="272" rx="16" fill="#ffffff" stroke="#d0d7de"/>
  <text x="56" y="92" fill="#1f2328" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">GitHub Metrics</text>
  <text x="56" y="146" fill="#57606a" font-family="Arial, Helvetica, sans-serif" font-size="22">This card will be generated by the "Generate Metrics" workflow.</text>
  <text x="56" y="188" fill="#57606a" font-family="Arial, Helvetica, sans-serif" font-size="22">Add the repository secret METRICS_TOKEN, then run the workflow once.</text>
  <text x="56" y="246" fill="#0969da" font-family="Arial, Helvetica, sans-serif" font-size="20">Output file: github-metrics.svg</text>
</svg>
